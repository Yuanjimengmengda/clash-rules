name: Publish Clash rule sets

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "rulesets/**"
      - ".github/workflows/run.yml"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master
        uses: actions/checkout@v6

      - name: Validate rule-set files
        run: |
          set -euo pipefail
          test -d rulesets
          for file in rulesets/*.txt; do
            test -f "$file"
            head -n 1 "$file" | grep -qx "payload:"
          done

      - name: Copy files to publish directory
        run: |
          set -euo pipefail
          mkdir -p publish
          cp rulesets/*.txt publish/

      - name: Push assets to release branch
        run: |
          set -euo pipefail
          cd publish
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add .
          git commit -m "Publish rule sets"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f origin release

      - name: Purge jsDelivr CDN
        run: |
          cd publish
          for file in *; do
            curl -fsS "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/${file}" || true
          done
